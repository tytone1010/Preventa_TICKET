<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket de Venta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ticket">Cargando ticket...</div>

    <script>
        function renderTicket() {
            // 1. Capturamos la URL completa
            const urlString = window.location.href;
            
            // 2. Extraemos lo que está después de "?ticket=" manualmente por seguridad
            const part = urlString.split('ticket=')[1];
            
            if (part) {
                // 3. Decodificamos el contenido URI
                const decodedHTML = decodeURIComponent(part);
                
                // 4. Lo inyectamos en el div
                document.getElementById("ticket").innerHTML = decodedHTML;
            } else {
                document.getElementById("ticket").innerHTML = "Error: No se encontró contenido para el ticket.";
            }
        }

        // Ejecutar al cargar la página
        window.onload = renderTicket;
    </script>

</body>
</html>
