<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ticket"></div>

    <script>
        // Usamos una función más segura para obtener el parámetro de la URL
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const ticketHTML = getQueryParam("ticket");

        if (ticketHTML) {
            // Insertamos el contenido y forzamos el renderizado
            document.getElementById("ticket").innerHTML = decodeURIComponent(ticketHTML);
            
            // Auto-impresión opcional (quitar si no se desea)
            // window.print(); 
        } else {
            document.getElementById("ticket").innerHTML = "Error: No se recibió información del ticket o la URL es demasiado larga.";
        }
    </script>
</body>
</html>
