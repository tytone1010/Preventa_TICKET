<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Ticket</title>
</head>

<body>

<div id="ticket"></div>

<script>

const params = new URLSearchParams(window.location.search)

const html = params.get("ticket")

if(html){

document.getElementById("ticket").innerHTML = decodeURIComponent(html)

}

</script>

</body>

</html>
