 <!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Ticket Preventa</title>

<style>

body{
font-family:Arial;
background:#eee;
}

.ticket{
width:300px;
margin:auto;
background:white;
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
border-bottom:1px dashed black;
}

.right{
text-align:right;
}

.center{
text-align:center;
}

</style>

</head>

<body>

<div class="ticket">

<h2 style="text-align:center">BODEGA EL CARACOL</h2>
<h3 style="text-align:center">PEDIDO PREVENTA</h3>

<div id="info"></div>

<br>

<table>

<thead>

<tr>
<th>Cant</th>
<th>Unidad</th>
<th>Vend</th>
<th>PUnit</th>
<th>Sub</th>
</tr>

</thead>

<tbody id="detalle"></tbody>

</table>

<br>

<table>

<tr>
<td>Subtotal</td>
<td class="right" id="subtotal"></td>
</tr>

<tr>
<td>ISV</td>
<td class="right" id="isv"></td>
</tr>

<tr>
<td><b>TOTAL</b></td>
<td class="right" id="total"></td>
</tr>

</table>

<br>

<div style="text-align:center">
*** Gracias por su compra ***
</div>

</div>

<script src="script.js"></script>

</body>
</html>
